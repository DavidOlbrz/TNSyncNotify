version: '3.8'

services:
  tnsyncnotify:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tnsyncnotify
    restart: unless-stopped
    environment:
      # Required environment variables
      TRUENAS_HOST: ${TRUENAS_HOST}
      TRUENAS_API_KEY: ${TRUENAS_API_KEY}
      DISCORD_WEBHOOK: ${DISCORD_WEBHOOK}
      # Optional: Set to 0 if you have a valid SSL certificate, 1 for self-signed
      NODE_TLS_REJECT_UNAUTHORIZED: ${NODE_TLS_REJECT_UNAUTHORIZED:-0}
      # Optional timing/reliability tuning
      CHECK_INTERVAL_MS: ${CHECK_INTERVAL_MS:-60000}
      RUNNING_UPDATE_INTERVAL_MS: ${RUNNING_UPDATE_INTERVAL_MS:-300000}
      RECONNECT_DELAY_MS: ${RECONNECT_DELAY_MS:-5000}
      KEEPALIVE_INTERVAL_MS: ${KEEPALIVE_INTERVAL_MS:-30000}
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
